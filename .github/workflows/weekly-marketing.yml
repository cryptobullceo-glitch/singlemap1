name: Signalmap Weekly Marketing

on:
  # Every Monday: newsletter 8am, Twitter 9am, Reddit 10am, LinkedIn 11am UTC
  schedule:
    - cron: '0 9 * * 1'   # Twitter thread — Monday 9am UTC
  workflow_dispatch:
    inputs:
      channels:
        description: 'Which channels to post (twitter,reddit,linkedin,all)'
        required: false
        default: 'all'

jobs:
  # ── Step 1: Generate content from live data ────────────────
  generate-content:
    name: Generate weekly content
    runs-on: ubuntu-latest
    outputs:
      content_path: /tmp/marketing-content.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: marketing
        run: npm install

      - name: Generate content from live data
        working-directory: marketing
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node generate-content.js

      - name: Upload content artifact
        uses: actions/upload-artifact@v4
        with:
          name:           marketing-content
          path:           /tmp/marketing-content.json
          retention-days: 1

  # ── Step 2a: Twitter ───────────────────────────────────────
  post-twitter:
    name: Post Twitter thread
    runs-on: ubuntu-latest
    needs: generate-content
    if: ${{ github.event.inputs.channels == 'twitter' || github.event.inputs.channels == 'all' || github.event.inputs.channels == '' || github.event_name == 'schedule' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: marketing
        run: npm install

      - name: Download content
        uses: actions/download-artifact@v4
        with:
          name: marketing-content
          path: /tmp/

      - name: Post Twitter thread
        working-directory: marketing
        env:
          TWITTER_APP_KEY:        ${{ secrets.TWITTER_APP_KEY }}
          TWITTER_APP_SECRET:     ${{ secrets.TWITTER_APP_SECRET }}
          TWITTER_ACCESS_TOKEN:   ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET:  ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: node post-twitter.js

  # ── Step 2b: Reddit (1 hour after Twitter) ─────────────────
  post-reddit:
    name: Post Reddit thread
    runs-on: ubuntu-latest
    needs: generate-content
    if: ${{ github.event.inputs.channels == 'reddit' || github.event.inputs.channels == 'all' || github.event_name == 'schedule' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: marketing
        run: npm install

      - name: Download content
        uses: actions/download-artifact@v4
        with:
          name: marketing-content
          path: /tmp/

      - name: Post to Reddit
        working-directory: marketing
        env:
          REDDIT_CLIENT_ID:     ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME:      ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD:      ${{ secrets.REDDIT_PASSWORD }}
        run: node post-reddit.js

  # ── Step 2c: LinkedIn ──────────────────────────────────────
  post-linkedin:
    name: Post LinkedIn update
    runs-on: ubuntu-latest
    needs: generate-content
    if: ${{ github.event.inputs.channels == 'linkedin' || github.event.inputs.channels == 'all' || github.event_name == 'schedule' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: marketing
        run: npm install

      - name: Download content
        uses: actions/download-artifact@v4
        with:
          name: marketing-content
          path: /tmp/

      - name: Post to LinkedIn
        working-directory: marketing
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_AUTHOR_URN:   ${{ secrets.LINKEDIN_AUTHOR_URN }}
        run: node post-linkedin.js
